<!--
  Supabase → Authentication → Email Templates → "Reset Password"
  Subject:  Your SpeakCraft password reset code
  Uses {{ .Token }} = the 6-digit OTP the mobile app verifies (OtpType.recovery).
-->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
       style="background:#f4f4f5;margin:0;padding:24px 0;font-family:Helvetica,Arial,sans-serif;">
  <tr>
    <td align="center">
      <table width="480" cellpadding="0" cellspacing="0" role="presentation"
             style="max-width:480px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e4e4e7;">
        <tr>
          <td style="padding:28px 32px 8px 32px;">
            <span style="font-size:20px;font-weight:700;color:#0496C7;letter-spacing:0.3px;">SpeakCraft</span>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 32px 0 32px;">
            <h1 style="margin:0;font-size:20px;color:#18181b;font-weight:700;">Reset your password</h1>
            <p style="margin:12px 0 0 0;font-size:14px;line-height:1.6;color:#52525b;">
              Enter this code in the app to set a new password for your SpeakCraft account.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px;">
            <div style="background:#ecf8fd;border:1px solid #b9e4f4;border-radius:12px;padding:18px;text-align:center;">
              <span style="font-family:'Courier New',monospace;font-size:34px;font-weight:700;letter-spacing:10px;color:#03789F;">{{ .Token }}</span>
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding:0 32px 24px 32px;">
            <p style="margin:0;font-size:13px;line-height:1.6;color:#71717a;">
              This code expires in 1 hour. If you didn't request a password reset, ignore this email — your password stays the same.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px;border-top:1px solid #f0f0f0;">
            <p style="margin:0;font-size:12px;color:#a1a1aa;">© SpeakCraft · English learning</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
